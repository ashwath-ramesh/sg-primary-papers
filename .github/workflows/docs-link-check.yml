name: Docs Internal Link Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs-link-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check docs internal links
        run: node scripts/check_docs_links.mjs
