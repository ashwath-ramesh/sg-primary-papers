<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Browse — P1 Papers</title>
  <meta name="description" content="Browse Primary 1 papers by subject, year, assessment, school." />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand"><a class="a" href="index.html" style="font-weight:900">SG Primary Papers</a> <span class="badge">Primary</span></div>
      <div class="nav">
        <a href="browse.html">Browse</a>
        <a href="collections.html">Collections</a>
        <a href="about.html">About</a>
      </div>
    </div>

    <div class="card">
      <h2>Browse papers</h2>
      <div class="row" style="margin-top:10px">
        <select id="level" class="select" aria-label="Level">
          <option value="p1">Primary 1</option>
          <option value="p2">Primary 2</option>
        </select>
        <input id="q" class="input" placeholder="Search (e.g., Henry Park, 2024, Quiz…)" />
        <select id="subject" class="select" aria-label="Subject"></select>
        <select id="year" class="select" aria-label="Year"></select>
        <select id="atype" class="select" aria-label="Assessment type"></select>
      </div>
      <div class="row" style="margin-top:10px">
        <button class="btn secondary" id="chip-all" type="button">All</button>
        <button class="btn secondary" id="chip-english" type="button">English</button>
        <button class="btn secondary" id="chip-maths" type="button">Maths</button>
        <button class="btn secondary" id="chip-chinese" type="button">Chinese</button>
      </div>
      <div class="row" style="margin-top:10px;justify-content:space-between">
        <button class="btn secondary" id="copyLink" type="button">Copy link</button>
        <div id="count" class="small"></div>
      </div>
    </div>

    <div class="card" style="margin-top:14px">
      <table class="table">
        <thead>
          <tr>
            <th>Paper</th>
            <th>Year</th>
            <th>Assessment</th>
            <th>Answers</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div class="footer">If you spot a broken link, report it via GitHub issues.</div>
  </div>

  <script src="./app.js"></script>
  <script>initBrowse().catch(err => alert(err.message));</script>
</body>
</html>
