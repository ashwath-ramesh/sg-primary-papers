<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Collections — SG Primary Papers</title>
  <meta name="description" content="Curated collections of Primary papers for quick practice." />
  <link rel="stylesheet" href="./styles.css" />
  <script defer src="https://analytics.millisecondlabs.com/script.js" data-website-id="620b5939-4f56-49f3-9eac-0141f805d3a5"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand"><a class="a" href="index.html" style="font-weight:900">SG Primary Papers</a> <span class="badge">Collections</span></div>
      <div class="nav">
        <a href="browse.html">Browse</a>
        <a href="collections.html">Collections</a>
        <a href="about.html">About</a>
      </div>
    </div>

    <div class="hero">
      <h1 class="h1" style="font-size:34px">Curated collections</h1>
      <p class="sub">Quick links that parents can share. Clean, focused, no fluff.</p>
    </div>

    <div id="list" class="card"></div>

    <div class="footer">More collections will be added over time.</div>
  </div>

  <script>
    async function loadCollections(){
      const res = await fetch('./data/collections.json', {cache:'no-store'});
      return res.json();
    }
    function buildUrl(c){
      if (c.id === 'top-picks') return 'browse.html?top=1';
      const p = new URLSearchParams();
      if (c.level) p.set('level', c.level);
      if (c.subject) p.set('subject', c.subject);
      if (c.type) p.set('type', c.type);
      if (c.year) p.set('year', c.year);
      return `browse.html?${p.toString()}`;
    }
    (async ()=>{
      const cols = await loadCollections();
      const el = document.getElementById('list');
      el.innerHTML = '<h2>Pick one</h2>';
      const ul = document.createElement('ul');
      ul.style.margin = '0';
      ul.style.paddingLeft = '18px';
      cols.forEach(c=>{
        const li = document.createElement('li');
        li.style.margin = '10px 0';
        const url = buildUrl(c);
        li.innerHTML = `
          <a class="a" href="${url}">${c.title}</a>
          <button class="btn secondary" type="button" style="padding:8px 10px;margin-left:10px" data-copy="${url}">Copy link</button>
        `;
        ul.appendChild(li);
      });

      ul.addEventListener('click', async (e)=>{
        const b = e.target.closest('button[data-copy]');
        if (!b) return;
        const rel = b.getAttribute('data-copy');
        const full = new URL(rel, location.href).toString();
        await navigator.clipboard.writeText(full);
        b.textContent = 'Copied';
        setTimeout(()=>b.textContent='Copy link', 1200);
      });
      el.appendChild(ul);
    })().catch(err=>alert(err.message));
  </script>
</body>
</html>
